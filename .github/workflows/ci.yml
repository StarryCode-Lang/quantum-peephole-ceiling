name: Q-Research CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: ${{ matrix.python-version }}
          environment-file: environment.yml
          activate-environment: q-research
          auto-activate-base: false

      - name: Verify environment versions
        shell: bash -l {0}
        run: |
          python -c "
          import qiskit, numpy, pandas, scipy, matplotlib
          print(f'Qiskit:  {qiskit.__version__}')
          print(f'NumPy:   {numpy.__version__}')
          print(f'Pandas:  {pandas.__version__}')
          print(f'SciPy:   {scipy.__version__}')
          print(f'Matplotlib: {matplotlib.__version__}')
          "

      - name: Run full test suite
        shell: bash -l {0}
        run: |
          python -m pytest tests/ -q --timeout=600

      - name: Verify canonical data
        shell: bash -l {0}
        run: |
          python scripts/reproduce_all.py --verify

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install flake8
      - name: Lint with flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

  verify-data-integrity:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          environment-file: environment.yml
          activate-environment: q-research
          auto-activate-base: false
      - name: Verify data integrity
        shell: bash -l {0}
        run: python scripts/reproduce_all.py --verify
