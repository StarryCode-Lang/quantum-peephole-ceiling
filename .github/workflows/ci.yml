name: Q-Research CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify environment versions
        run: |
          python -c "
          import qiskit, numpy, pandas, scipy, matplotlib
          print(f'Qiskit:  {qiskit.__version__}')
          print(f'NumPy:   {numpy.__version__}')
          print(f'Pandas:  {pandas.__version__}')
          print(f'SciPy:   {scipy.__version__}')
          print(f'Matplotlib: {matplotlib.__version__}')
          "

      - name: Run core tests
        run: |
          python tests/test_core.py

      - name: Run statistical tests
        run: |
          python tests/test_statistical_analysis.py

      - name: Verify canonical data
        run: |
          python scripts/reproduce_all.py --verify

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install flake8
      - name: Lint with flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t q-research:ci .
      - name: Run tests in Docker
        run: docker run --rm q-research:ci python tests/test_core.py
